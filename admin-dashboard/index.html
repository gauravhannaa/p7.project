<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Cyber Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-green-500 font-mono">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-black/90 border border-green-500/50 rounded-lg p-8 max-w-md w-full shadow-2xl shadow-green-500/20">
            <h1 class="text-3xl font-bold text-center mb-6 glow-text">&lt; Admin Access /&gt;</h1>
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-green-400 mb-2">Username</label>
                    <input type="text" id="username" required class="w-full bg-black/50 border border-green-500/30 rounded px-4 py-2 text-green-400 focus:outline-none focus:border-green-500">
                </div>
                <div>
                    <label class="block text-green-400 mb-2">Password</label>
                    <input type="password" id="password" required class="w-full bg-black/50 border border-green-500/30 rounded px-4 py-2 text-green-400 focus:outline-none focus:border-green-500">
                </div>
                <button type="submit" class="w-full bg-green-500 text-black font-bold py-2 rounded hover:bg-green-600 transition">Login</button>
            </form>
            <div id="errorMsg" class="mt-4 text-red-500 text-center hidden"></div>
        </div>
    </div>
    <script>
        const API_URL = 'https://p7-project-1.onrender.com/api';
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('errorMsg').textContent = data.message || 'Invalid credentials';
                    document.getElementById('errorMsg').classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('errorMsg').textContent = 'Login failed. Please try again.';
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
