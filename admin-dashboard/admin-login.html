<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Cyber Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
            font-family: 'Courier New', monospace;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .cursor-blink {
            animation: blink 1s step-end infinite;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="bg-gray-900/50 border border-green-500/30 rounded-lg p-8 w-full max-w-md">
        <div class="text-center mb-6">
            <div class="text-6xl mb-4">🔐</div>
            <h1 class="text-2xl font-bold text-green-400">ADMIN ACCESS</h1>
            <p class="text-gray-400 text-sm mt-2">Secure Authentication Required</p>
        </div>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm mb-1 text-green-400">Username</label>
                <input type="text" id="username" class="w-full bg-black border border-green-500/30 rounded px-4 py-2 text-green-400 focus:outline-none focus:border-green-500" required>
            </div>
            <div>
                <label class="block text-sm mb-1 text-green-400">Password</label>
                <input type="password" id="password" class="w-full bg-black border border-green-500/30 rounded px-4 py-2 text-green-400 focus:outline-none focus:border-green-500" required>
            </div>
            <button type="submit" class="w-full py-2 bg-green-500 text-black rounded hover:bg-green-600 transition font-bold">
                🚀 Authenticate
            </button>
        </form>
        
        <div class="mt-6 text-center text-xs text-gray-500">
            <p>&gt; _ Access Terminal v2.0</p>
            <p class="mt-2 cursor-blink">_</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://p7-project-1.onrender.com/api';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'dashboard.html';
                } else {
                    alert('❌ Invalid credentials!');
                }
            } catch (error) {
                alert('❌ Login failed: ' + error.message);
            }
        });
    </script>
</body>
</html>
