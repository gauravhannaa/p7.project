<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Cyber Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-green-500 font-mono">
    <nav class="bg-black/90 border-b border-green-500/30 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold glow-text">&lt; Admin Dashboard /&gt;</h1>
            <button id="logoutBtn" class="px-4 py-2 border border-red-500 text-red-500 rounded hover:bg-red-500 hover:text-black transition">Logout</button>
        </div>
    </nav>
    
    <div class="max-w-7xl mx-auto p-4">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
            <button onclick="showSection('profile')" class="bg-gray-900 border border-green-500/30 rounded-lg p-4 hover:border-green-500 transition">👤 Profile</button>
            <button onclick="showSection('skills')" class="bg-gray-900 border border-green-500/30 rounded-lg p-4 hover:border-green-500 transition">⚡ Skills</button>
            <button onclick="showSection('projects')" class="bg-gray-900 border border-green-500/30 rounded-lg p-4 hover:border-green-500 transition">📁 Projects</button>
            <button onclick="showSection('experience')" class="bg-gray-900 border border-green-500/30 rounded-lg p-4 hover:border-green-500 transition">💼 Experience</button>
            <button onclick="showSection('reports')" class="bg-gray-900 border border-green-500/30 rounded-lg p-4 hover:border-green-500 transition">📄 Reports</button>
            <button onclick="showSection('certifications')" class="bg-gray-900 border border-green-500/30 rounded-lg p-4 hover:border-green-500 transition">🎓 Certifications</button>
            <button onclick="showSection('repositories')" class="bg-gray-900 border border-green-500/30 rounded-lg p-4 hover:border-green-500 transition">📚 Repositories</button>
            <button onclick="showSection('contacts')" class="bg-gray-900 border border-green-500/30 rounded-lg p-4 hover:border-green-500 transition">📬 Contacts</button>
        </div>
        
        <!-- Profile Section -->
        <div id="profileSection" class="section hidden">
            <div class="bg-gray-900/50 border border-green-500/30 rounded-lg p-6 mb-6">
                <h2 class="text-2xl font-bold mb-4">Edit Profile</h2>
                <form id="profileForm" class="space-y-4">
                    <input type="text" id="profileName" placeholder="Full Name" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="text" id="profileTitle" placeholder="Title" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <textarea id="profileBio" placeholder="Bio" rows="3" class="w-full bg-black border border-green-500/30 rounded px-3 py-2"></textarea>
                    <input type="text" id="profileLocation" placeholder="Location" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="email" id="profileEmail" placeholder="Email" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="text" id="profilePhone" placeholder="Phone" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="url" id="profileGithub" placeholder="GitHub URL" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="url" id="profileLinkedin" placeholder="LinkedIn URL" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="url" id="profileInstagram" placeholder="Instagram URL" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <div>
                        <label class="block text-green-500 mb-2">Profile Photo</label>
                        <input type="file" id="profilePhoto" accept="image/*" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                        <button type="button" id="uploadPhotoBtn" class="mt-2 px-4 py-2 bg-green-500 text-black rounded hover:bg-green-600">Upload Photo</button>
                        <div id="currentPhoto" class="mt-2"></div>
                    </div>
                    <button type="submit" class="bg-green-500 text-black px-6 py-2 rounded hover:bg-green-600">Update Profile</button>
                </form>
                <div id="profileMessage" class="mt-4 text-green-500 hidden"></div>
            </div>
        </div>
        
        <!-- Skills Section (similar to before, but add edit/delete) -->
        <div id="skillsSection" class="section hidden">
            <div class="bg-gray-900/50 border border-green-500/30 rounded-lg p-6 mb-6">
                <h2 class="text-2xl font-bold mb-4">Add New Skill</h2>
                <form id="skillForm" class="space-y-4">
                    <input type="text" id="skillName" placeholder="Skill Name" required class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="number" id="skillPercent" placeholder="Percentage (0-100)" required class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <button type="submit" class="bg-green-500 text-black px-6 py-2 rounded hover:bg-green-600">Add Skill</button>
                </form>
            </div>
            <div id="skillsList" class="space-y-4"></div>
        </div>
        
        <!-- Projects, Experience, Reports sections (same as before) -->
        <!-- Certifications Section -->
        <div id="certificationsSection" class="section hidden">
            <div class="bg-gray-900/50 border border-green-500/30 rounded-lg p-6 mb-6">
                <h2 class="text-2xl font-bold mb-4">Add Certification</h2>
                <form id="certForm" class="space-y-4">
                    <input type="text" id="certTitle" placeholder="Title" required class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="text" id="certIssuer" placeholder="Issuer" required class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="text" id="certDate" placeholder="Date (e.g., 2023)" required class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="text" id="certId" placeholder="Credential ID" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="url" id="certUrl" placeholder="Verify URL" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <button type="submit" class="bg-green-500 text-black px-6 py-2 rounded hover:bg-green-600">Add Certification</button>
                </form>
            </div>
            <div id="certificationsList" class="space-y-4"></div>
        </div>
        
        <!-- Repositories Section -->
        <div id="repositoriesSection" class="section hidden">
            <div class="bg-gray-900/50 border border-green-500/30 rounded-lg p-6 mb-6">
                <h2 class="text-2xl font-bold mb-4">Add Repository</h2>
                <form id="repoForm" class="space-y-4">
                    <input type="text" id="repoName" placeholder="Repository Name" required class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="text" id="repoDesc" placeholder="Description" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="text" id="repoLang" placeholder="Language" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="number" id="repoStars" placeholder="Stars" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="number" id="repoForks" placeholder="Forks" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="text" id="repoUpdated" placeholder="Last updated (e.g., 2025-01-15)" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="url" id="repoUrl" placeholder="Repository URL" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <button type="submit" class="bg-green-500 text-black px-6 py-2 rounded hover:bg-green-600">Add Repository</button>
                </form>
            </div>
            <div id="repositoriesList" class="space-y-4"></div>
        </div>
        
        <!-- Contacts Section -->
        <div id="contactsSection" class="section hidden">
            <div id="contactsList" class="space-y-4"></div>
        </div>
    </div>
    
    <script src="dashboard.js"></script>
</body>
</html>
