<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Cyber Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-green-500 font-mono">
    <nav class="bg-black/90 border-b border-green-500/30 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold glow-text">&lt; Admin Dashboard /&gt;</h1>
            <button id="logoutBtn" class="px-4 py-2 border border-red-500 text-red-500 rounded hover:bg-red-500 hover:text-black transition">Logout</button>
        </div>
    </nav>
    
    <div class="max-w-7xl mx-auto p-4">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <button onclick="showSection('projects')" class="bg-gray-900 border border-green-500/30 rounded-lg p-4 hover:border-green-500 transition">📁 Projects</button>
            <button onclick="showSection('experience')" class="bg-gray-900 border border-green-500/30 rounded-lg p-4 hover:border-green-500 transition">💼 Experience</button>
            <button onclick="showSection('skills')" class="bg-gray-900 border border-green-500/30 rounded-lg p-4 hover:border-green-500 transition">⚡ Skills</button>
            <button onclick="showSection('reports')" class="bg-gray-900 border border-green-500/30 rounded-lg p-4 hover:border-green-500 transition">📄 Reports</button>
        </div>
        
        <div id="projectsSection" class="section hidden">
            <div class="bg-gray-900/50 border border-green-500/30 rounded-lg p-6 mb-6">
                <h2 class="text-2xl font-bold mb-4">Add New Project</h2>
                <form id="projectForm" class="space-y-4">
                    <input type="text" id="projectTitle" placeholder="Title" required class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <textarea id="projectDesc" placeholder="Description" required class="w-full bg-black border border-green-500/30 rounded px-3 py-2"></textarea>
                    <input type="text" id="projectImage" placeholder="Image URL" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="text" id="projectDemo" placeholder="Demo Link" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="text" id="projectGithub" placeholder="GitHub Link" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <button type="submit" class="bg-green-500 text-black px-6 py-2 rounded hover:bg-green-600">Add Project</button>
                </form>
            </div>
            <div id="projectsList" class="space-y-4"></div>
        </div>
        
        <div id="experienceSection" class="section hidden">
            <div class="bg-gray-900/50 border border-green-500/30 rounded-lg p-6 mb-6">
                <h2 class="text-2xl font-bold mb-4">Add New Experience</h2>
                <form id="experienceForm" class="space-y-4">
                    <input type="text" id="expCompany" placeholder="Company" required class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="text" id="expRole" placeholder="Role" required class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="text" id="expStartDate" placeholder="Start Date (e.g., Jan 2022)" required class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="text" id="expEndDate" placeholder="End Date (leave blank if current)" class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <label class="flex items-center gap-2">
                        <input type="checkbox" id="expCurrent"> Current Position
                    </label>
                    <textarea id="expResponsibilities" placeholder="Responsibilities (one per line)" required class="w-full bg-black border border-green-500/30 rounded px-3 py-2"></textarea>
                    <button type="submit" class="bg-green-500 text-black px-6 py-2 rounded hover:bg-green-600">Add Experience</button>
                </form>
            </div>
            <div id="experienceList" class="space-y-4"></div>
        </div>
        
        <div id="skillsSection" class="section hidden">
            <div class="bg-gray-900/50 border border-green-500/30 rounded-lg p-6 mb-6">
                <h2 class="text-2xl font-bold mb-4">Add New Skill</h2>
                <form id="skillForm" class="space-y-4">
                    <input type="text" id="skillName" placeholder="Skill Name" required class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <input type="number" id="skillPercent" placeholder="Percentage (0-100)" required class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <button type="submit" class="bg-green-500 text-black px-6 py-2 rounded hover:bg-green-600">Add Skill</button>
                </form>
            </div>
            <div id="skillsList" class="space-y-4"></div>
        </div>
        
        <div id="reportsSection" class="section hidden">
            <div class="bg-gray-900/50 border border-green-500/30 rounded-lg p-6 mb-6">
                <h2 class="text-2xl font-bold mb-4">Add New Report</h2>
                <form id="reportForm" class="space-y-4">
                    <input type="text" id="reportTitle" placeholder="Report Title" required class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <textarea id="reportDesc" placeholder="Description" required class="w-full bg-black border border-green-500/30 rounded px-3 py-2"></textarea>
                    <input type="url" id="reportUrl" placeholder="PDF URL" required class="w-full bg-black border border-green-500/30 rounded px-3 py-2">
                    <button type="submit" class="bg-green-500 text-black px-6 py-2 rounded hover:bg-green-600">Add Report</button>
                </form>
            </div>
            <div id="reportsList" class="space-y-4"></div>
        </div>
    </div>
    
    <script src="dashboard.js"></script>
</body>
</html>
